<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saku Pintar | Portal Utama</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400..900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="shared/css/global.css">
    <style>
        
        @font-face {
            font-family: 'Skillet Condensed';
            src: url('shared/fonts/skillet-condensed.ttf') format('truetype'),
                url('shared/fonts/skillet-condensed.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        
        html,
        body {
            overscroll-behavior: none;
            
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #85C1E9;
            
            margin: 0;
            overflow-x: hidden;
        }

        
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('shared/assets/bg-pantai.png');
            background-size: cover;
            background-position: center bottom;
            background-repeat: no-repeat;
            z-index: -2;
            pointer-events: none;
        }

        
        body::after {
            content: "";
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 40vh;
            
            background-image: url('shared/assets/overlay-siswa.png');
            background-size: contain;
            background-position: center bottom;
            background-repeat: no-repeat;
            z-index: 1;
            pointer-events: none;
        }

        .portal-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 50px 40px;
            border-radius: 40px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15), inset 0 0 15px rgba(255, 255, 255, 0.4);
            text-align: center;
            max-width: 500px;
            width: 90%;
            border: 2px solid rgba(255, 255, 255, 0.5);
            position: relative;
            z-index: 2;
        }

        .portal-card h1 {
            color: #10c2e2;
            font-family: 'Skillet Condensed', 'League Spartan', sans-serif;
            margin-bottom: 15px;
            font-size: 5rem;
            text-shadow: 2px 2px 0px #0b849b, 0 4px 10px rgba(0, 0, 0, 0.1);
            animation: bounce 2s infinite ease-in-out;
            letter-spacing: -1px;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .portal-card p {
            font-size: 1.2rem;
            color: #5D6D7E;
            margin-bottom: 35px;
            font-family: 'League Spartan', sans-serif;
            font-weight: 600;
        }

        .portal-options {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        
        .btn-student {
            background-color: #F4D03F;
            
            color: white;
            font-family: 'League Spartan', sans-serif;
            font-weight: 700;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
            font-size: 1.4rem;
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 8px 0 #D4AC0D;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            transition: transform 0.1s;
        }

        .btn-student:active {
            transform: translateY(8px) scale(0.98);
            box-shadow: 0 0 0 #D4AC0D;
        }

        
        .btn-teacher {
            background-color: #2980B9;
            
            color: white;
            font-family: 'League Spartan', sans-serif;
            font-weight: 700;
            font-size: 1.4rem;
            padding: 18px;
            border-radius: 30px;
            box-shadow: 0 6px 0 #1A5276;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            transition: transform 0.1s;
        }

        .btn-teacher:active {
            transform: translateY(6px) scale(0.98);
            box-shadow: 0 0 0 #1A5276;
        }

        
        @media (max-width: 768px) {
            body::after {
                height: 25vh;
                
                
                background-image: url('shared/assets/overlay-siswa.png'), url('shared/assets/overlay-siswa.png');
                background-position: left bottom, right bottom;
                background-size: auto 100%, auto 100%;
                background-repeat: no-repeat, no-repeat;
            }

            .portal-card {
                padding: 30px 15px;
            }

            .portal-card h1 {
                font-size: 3rem;
                white-space: normal;
                
            }

            .portal-card p {
                font-size: 1rem;
                margin-bottom: 25px;
            }

            .btn-student {
                font-size: 1.1rem;
                padding: 15px;
            }

            .btn-teacher {
                font-size: 1rem;
                padding: 12px;
            }
        }
    </style>
</head>

<body ontouchstart="">


    <div class="portal-card">
        <h1>Saku Pintar</h1> 
        <p>Portal edukasi interaktif untuk belajar mengatur uang dengan cara yang menyenangkan!</p>

        <div class="portal-options">
            
            <a href="login-siswa.html" class="btn btn-student">Masuk sebagai Murid</a>
            
            <a href="login-guru.html" class="btn btn-teacher">Masuk Dashboard Guru</a>
        </div>
    </div>

    
    <script src="shared/js/utils.js"></script>
</body>

</html>
